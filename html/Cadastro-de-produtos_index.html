<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/Cadastro-de-produtos-style.css">
    <title>Pagina de cadastro de produtos</title>
</head>

<body>
    <header>
        <h1>Cadastro de produtos</h1>
    </header>
    <main>
        <form id="form">
            <h3>Cadastra produtos</h3>
            <input type="text" id="Produtos" placeholder="Adicione mais Produtos">
            <input type="text" id="Precos" placeholder="Preços">
            <input type="text" id="Quantidade" placeholder="contidade">
            <input type="submit" value="Enviar">
        </form>
    </main>
    <script type="module" src="../js/scriptCadastroDeProdutos.js"></script>
</body>

</html>
